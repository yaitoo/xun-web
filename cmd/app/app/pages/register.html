<!--layout:base-->
{{define "content"}}
<div class="min-h-screen flex items-center justify-center py-12 px-6">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold mb-2">
        <span class="text-tech-cyan">Create</span>
        <span class="text-gray-300">Account</span>
      </h1>
      <p class="text-gray-400">Join Xun Web today</p>
    </div>

    <div class="card">
      <!-- Error message placeholder -->
      <div id="error-message"></div>

      <form
        hx-post="/register"
        hx-target="#error-message"
        hx-swap="innerHTML"
        class="space-y-5"
      >
        <div>
          <label class="label">Name</label>
          <input type="text" name="name" class="input" placeholder="John Doe" required>
        </div>

        <div>
          <label class="label">Email</label>
          <input type="email" name="email" class="input" placeholder="you@example.com" required>
        </div>

        <div>
          <label class="label">Password</label>
          <input type="password" name="password" class="input" placeholder="Minimum 6 characters" minlength="6" required>
        </div>

        <button type="submit" class="btn btn-primary w-full py-2.5">
          Create Account
        </button>
      </form>

      <p class="text-center text-sm text-gray-400 mt-6">
        Already have an account?
        <a href="/login" class="text-tech-cyan hover:text-tech-cyan/80">Sign In</a>
      </p>
    </div>
  </div>
</div>
{{end}}
