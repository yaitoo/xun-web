<div class="flex items-center justify-between p-4 bg-dark-200 rounded-lg border border-dark-300">
  <div class="text-sm text-gray-400">
    Showing {{.page.Start}} to {{.page.End}} of {{.page.Total}} results
  </div>
  
  <div class="flex items-center gap-2">
    {{if .page.HasPrev}}
    <a 
      href="{{.page.PrevURL}}" 
      class="btn btn-secondary py-1.5 px-3 text-sm"
      hx-get="{{.page.PrevURL}}"
      hx-target="#content"
      hx-swap="innerHTML"
    >
      Previous
    </a>
    {{else}}
    <button class="btn btn-secondary py-1.5 px-3 text-sm opacity-50 cursor-not-allowed" disabled>
      Previous
    </button>
    {{end}}
    
    {{range .page.Pages}}
    {{if eq . .$.page.Current}}
    <span class="btn btn-primary py-1.5 px-3 text-sm">{{.}}</span>
    {{else}}
    <a 
      href="{{$.page.URLFor .}}" 
      class="btn btn-secondary py-1.5 px-3 text-sm"
      hx-get="{{$.page.URLFor .}}"
      hx-target="#content"
      hx-swap="innerHTML"
    >
      {{.}}
    </a>
    {{end}}
    {{end}}
    
    {{if .page.HasNext}}
    <a 
      href="{{.page.NextURL}}" 
      class="btn btn-secondary py-1.5 px-3 text-sm"
      hx-get="{{.page.NextURL}}"
      hx-target="#content"
      hx-swap="innerHTML"
    >
      Next
    </a>
    {{else}}
    <button class="btn btn-secondary py-1.5 px-3 text-sm opacity-50 cursor-not-allowed" disabled>
      Next
    </button>
    {{end}}
  </div>
</div>
