<tr id="user-row-{{.user.ID}}">
  <td class="font-mono text-gray-400">#{{.user.ID}}</td>
  <td>{{.user.Name}}</td>
  <td>{{.user.Email}}</td>
  <td>{{.user.CreatedAt.Format "2006-01-02"}}</td>
  <td class="text-right">
    <div class="flex items-center justify-end gap-2">
      <button 
        class="btn btn-secondary py-1.5 px-3 text-sm"
        hx-get="/dashboard/views/users/edit/{{.user.ID}}"
        hx-target="#user-form-container"
        hx-swap="innerHTML"
      >
        Edit
      </button>
      <button 
        class="btn btn-danger py-1.5 px-3 text-sm"
        hx-delete="/dashboard/users/{{.user.ID}}"
        hx-target="#user-row-{{.user.ID}}"
        hx-swap="delete"
        hx-confirm="Are you sure you want to delete this user?"
      >
        Delete
      </button>
    </div>
  </td>
</tr>
